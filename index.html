<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>name | Portfolio</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="page">
        <section class="itsme">
            <h1>name</h1>
            <p>Aspiring Full-Stack Developer</p>
        </section>

        <section class="projects">
            <h2>Projects</h2>

            <div class="grid">

                <a class="card" href="https://github.com/yourusername/postpage" target="_blank">
                    <h3>PostPage</h3>
                    <p>Full-stack blog platform with authentication</p>
                </a>

                <a class="card" href="#" target="_blank">
                    <h3>Coming Soon</h3>
                    <p>More projects will be added here</p>
                </a>

            </div>
        </section>
    </main>

    <button id="theme-toggle" class="toggle-btn" onclick="toggleTheme()" aria-label="Toggle Theme">
        🌙
    </button>
</body>

<script>

    const toggleButton =
        document.getElementById("theme-toggle");

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
        toggleButton.textContent = "☀️";
    }

    function toggleTheme() {

        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
            localStorage.setItem("theme", "dark");
            toggleButton.textContent = "☀️";
        } else {
            localStorage.removeItem("theme");
            toggleButton.textContent = "🌙";
        }

    }

</script>

</html>
